<body>
<div class="header">
  <h1>Instance.js — Direct Element Architecture — Unified Test Suite <span class="version-tag">V0.87.z</span></h1>
  <div class="sub">
    <span class="n">Native class behaviour</span><span class="arr">↔</span><span class="v">Virtual prototype parity</span><span class="arr">↔</span><span class="s">Instance Source [.is] → compiled</span>
  </div>
</div>
<div class="summary" id="suite-summary">booting…</div>
<div id="suite-root"></div>
<script src="Instance-0.88.0.js" ⚡ @pascal autoclass='core, baseline'></script>
<script>
/* suite-harness.js — runtime for the unified Instance test suite (Pass Q).
 * Model: every test is a registry entry with FOUR column sources —
 *   vanilla   Vanilla JS (Native Engine)
 *   hybrid    Hybridized Virtual Class Inheritance (ES6-JS-DOM) [Instance.js]
 *   is        Instance Source [.is]
 *   output    compiled .is when present, else the captured runtime log
 * Kinds: 'diff' (agreement, from the Protobridge suite) · 'divergence' (WARN)
 * · 'is' (compile → run with asserts) · 'js' (run with asserts). Columns are
 * textareas under a Compiler.prettify(format:false) overlay — edit and re-run.
 * First-run badges for 'diff'/'divergence' use the LIVE closures captured at
 * registration (original semantics, shared fixtures intact); re-runs eval the
 * edited column text. KNOWN-FAIL: 'instanceof Instance is true' renders red
 * and is tallied separately — red on purpose, by decision. */
'use strict';

var SUITE_REG = [];
var SUITE_AREAS = ['CORE', 'COMPILER', 'CHIMERA', 'DSL', 'MISC', 'API', 'KRAUSEST'];
var SUITE_BLURBS = {
	CORE: 'Protobridge unit tests (verbatim, V0.74 lineage) + element-identity cases. Native ↔ virtual parity.',
	KRAUSEST: 'js-framework-benchmark — vanillajs-keyed, verbatim, timed in-page.'
};
var KNOWN_FAIL_LABELS = {
	// Pass Q5: 'instanceof Instance is true' + 'instanceof matches class-native prototype chain'
	// now PASS via Instance[Symbol.hasInstance] (the mint is the brand). Promoted out of known-fail.
	// The remaining identity divergence is getPrototypeOf only — see the 'synthetic proto parent'
	// testDivergence, which stays a WARN by decision (solving it needs global-prototype colonization).
};
// author STUBS carried verbatim from the source file — empty bodies, no assertion; surfaced as WARN not fabricated PASS
var STUB_LABELS = { 'statics defer correctly': 'empty test body in the source suite — both sides return undefined (nothing to assert)' };

/* ── helpers lifted verbatim from the Protobridge suite ── */
var fnSource = function getSource(input) {
	if (typeof input !== 'function') return String(input == null ? '' : input).trim();
	let src = input.toString()
		.replace(/^(?:function\s*\w*\s*)?\([^)]*\)\s*(?:=>\s*)?\{/, '')
		.replace(/\}[\s]*$/, '');
	const lines = src.split('\n');
	const nonEmpty = lines.filter(l => l.trim().length > 0);
	const minIndent = nonEmpty.length
		? nonEmpty.reduce((m, l) => Math.min(m, l.match(/^(\s*)/)[1].length), Infinity)
		: 0;
	return lines.map(l => l.slice(minIndent)).join('\n').trim();
};
function expectThrows(fn, msg) {
	let threw = false;
	try { fn(); } catch (e) { threw = true; }
	if (!threw) throw new Error(msg || 'Expected a throw but nothing was thrown');
}
function expectNoThrow(fn, msg) {
	try { fn(); } catch (e) { throw new Error((msg || 'Should not throw') + ': ' + e.message); }
}

/* ── registration shims — the Protobridge calls land here unchanged ── */
function testDiff(suiteName, label, sides) {
	SUITE_REG.push({
		area: 'CORE', suite: suiteName, label, kind: 'diff',
		vanilla: fnSource(sides['native']), hybrid: fnSource(sides['virtual']), is: '', output: '',
		live: { native: sides['native'], virtual: sides['virtual'] },
		known: Object.prototype.hasOwnProperty.call(KNOWN_FAIL_LABELS, label) ? KNOWN_FAIL_LABELS[label] : null,
		stub: Object.prototype.hasOwnProperty.call(STUB_LABELS, label) ? STUB_LABELS[label] : null
	});
}
function testDivergence(suiteName, label, reason, sides) {
	SUITE_REG.push({
		area: 'CORE', suite: suiteName, label, kind: 'divergence', reason,
		vanilla: fnSource(sides['native']), hybrid: fnSource(sides['virtual']), is: '', output: '',
		live: { native: sides['native'], virtual: sides['virtual'] }, known: null
	});
}

/* ── PLAYGROUND_TESTS → registry (the dropdown suites, restyled) ── */
function convertPlayground(T) {
	var MAP = { COMPILER: 'COMPILER', CORE: 'CORE', DSL: 'DSL', KERNEL: 'CHIMERA', MISC: 'MISC', API: 'API' };
	Object.keys(MAP).forEach(function (k) {
		var src = T[k]; if (!src) return;
		var area = MAP[k];
		if (src.blurb && !SUITE_BLURBS[area]) SUITE_BLURBS[area] = src.blurb;
		src.cases.forEach(function (c) {
			var isLang = src.lang === 'is';
			SUITE_REG.push({
				area, suite: c.suite || null, label: c.name, kind: isLang ? 'is' : 'js',
				vanilla: '', hybrid: isLang ? '' : c.src, is: isLang ? c.src : '', output: '',
				live: null, known: null
			});
		});
	});
}

/* ── execution ── */
function agreement(nativeFn, virtualFn) { // verbatim testDiff semantics
	let nV, nE, nT = false, vV, vE, vT = false;
	try { nV = nativeFn(); } catch (e) { nT = true; nE = e; }
	try { vV = virtualFn(); } catch (e) { vT = true; vE = e; }
	let pass = false, detail = '';
	if (nT && vT) pass = true;
	else if (nT !== vT) {
		const who = nT ? 'native' : 'virtual';
		const err = nT ? nE : vE;
		detail = who + ' threw (' + err.message + ') but the other did not';
	} else if (nV && vV) pass = true;
	else if (!nV && !vV) detail = 'both falsy — native: ' + JSON.stringify(nV) + ', virtual: ' + JSON.stringify(vV);
	else detail = (!nV ? 'native' : 'virtual') + ' returned ' + JSON.stringify(!nV ? nV : vV);
	return { pass, detail, log: 'native  → ' + (nT ? 'THREW ' + nE.message : JSON.stringify(nV)) + '\nvirtual → ' + (vT ? 'THREW ' + vE.message : JSON.stringify(vV)) };
}
function colFn(body) { return new Function('"use strict";\n' + body); }

var SANDBOX = null;
function sandboxPlay() {
	if (!SANDBOX) { SANDBOX = document.createElement('div'); SANDBOX.id = 'suite-sandbox'; document.body.appendChild(SANDBOX); }
	var play = document.createElement('div');
	SANDBOX.appendChild(play);
	return play;
}
async function runWithAsserts(jsBody, logLines) {
	var asserts = [];
	var assert = function (x, m) { asserts.push({ ok: !!x, m: m || '' }); };
	var log = function () { logLines.push([].map.call(arguments, function (a) { try { return typeof a === 'string' ? a : JSON.stringify(a); } catch (e) { return String(a); } }).join(' ')); };
	var play = sandboxPlay();
	var err = null;
	try {
		await new Function('Instance', 'Signal', 'Store', 'assert', 'log', 'play', 'document',
			'return (async () => {\n' + jsBody + '\n})();'
		)(window.Instance, window.Instance.Chimera.Signal, window.Instance.Chimera.Signal.Store, assert, log, play, document);
	} catch (e) { err = e; }
	try { if (play.parentNode) play.parentNode.removeChild(play); } catch (e) {}
	return { asserts, err };
}

async function runEntry(entry, fromEditors) {
	var ed = entry._editors || {};
	var val = function (k) { return ed[k] ? ed[k].textarea.value : entry[k]; };
	if (entry.kind === 'diff' || entry.kind === 'divergence') {
		var res;
		if (fromEditors || !entry.live) {
			try { res = agreement(colFn(val('vanilla')), colFn(val('hybrid'))); }
			catch (e) { res = { pass: false, detail: 'column eval error: ' + e.message, log: String(e) }; }
		} else res = agreement(entry.live.native, entry.live.virtual);
		entry.output = res.log;
		if (entry.kind === 'divergence') { entry.state = 'warn'; entry.detail = entry.reason; }
		else if (entry.stub) { entry.state = 'warn'; entry.detail = entry.stub; }
		else { entry.state = res.pass ? 'pass' : 'fail'; entry.detail = res.detail; }
	}
	else if (entry.kind === 'is') {
		var logLines = [];
		var compiled = null, cerr = null;
		try { compiled = window.Instance.Compiler.compile(val('is')).code; }
		catch (e) { cerr = e; }
		if (cerr) { entry.state = 'fail'; entry.detail = 'compile: ' + cerr.message; entry.output = '// COMPILE ERROR\n// ' + cerr.message; }
		else {
			entry.output = compiled; // the decided contract: .is present → output = compiled JS
			var r = await runWithAsserts(compiled, logLines);
			var bad = r.asserts.filter(function (a) { return !a.ok; });
			entry.state = (!r.err && r.asserts.length && !bad.length) ? 'pass' : 'fail';
			entry.detail = r.err ? 'threw: ' + r.err.message : (bad.length ? bad.map(function (a) { return a.m; }).join(' · ') : (r.asserts.length ? '' : 'no asserts ran'));
		}
	}
	else if (entry.kind === 'js') {
		var lines = [];
		var r2 = await runWithAsserts(val('hybrid'), lines);
		var bad2 = r2.asserts.filter(function (a) { return !a.ok; });
		entry.state = (!r2.err && r2.asserts.length && !bad2.length) ? 'pass' : 'fail';
		entry.detail = r2.err ? 'threw: ' + r2.err.message : (bad2.length ? bad2.map(function (a) { return a.m; }).join(' · ') : (r2.asserts.length ? '' : 'no asserts ran'));
		entry.output = r2.asserts.map(function (a) { return (a.ok ? '✓ ' : '✗ ') + a.m; }).concat(lines, r2.err ? ['THREW: ' + r2.err.message] : []).join('\n');
	}
	if (entry._ui) paintEntry(entry);
	refreshSummary();
}

/* ── editors: textarea over a prettified <pre> overlay ── */
function makeEditor(labelText, sideClass, value, lang) {
	var col = document.createElement('div'); col.className = 'diff-col';
	var lbl = document.createElement('div'); lbl.className = 'diff-col-label ' + sideClass; lbl.textContent = labelText;
	var wrap = document.createElement('div'); wrap.className = 'ed-wrap';
	var pre = document.createElement('pre'); pre.className = 'ed-hl'; pre.setAttribute('aria-hidden', 'true');
	var ta = document.createElement('textarea'); ta.className = 'ed-ta'; ta.spellcheck = false; ta.value = value || '';
	var paint = function () {
		var P = window.Instance && window.Instance.Compiler && window.Instance.Compiler.prettify;
		pre.innerHTML = (P ? P(ta.value, { lang: lang }) : ta.value.replace(/&/g, '&amp;').replace(/</g, '&lt;')) + '\n';
		var rows = ta.value.split('\n').length;
		ta.rows = Math.max(3, Math.min(26, rows + 1));
		pre.style.height = ta.scrollHeight ? '' : '';
	};
	ta.addEventListener('input', paint);
	ta.addEventListener('scroll', function () { pre.scrollTop = ta.scrollTop; pre.scrollLeft = ta.scrollLeft; });
	wrap.appendChild(pre); wrap.appendChild(ta);
	col.appendChild(lbl); col.appendChild(wrap);
	return { col, textarea: ta, paint, painted: false };
}

/* ── rendering ── */
function paintEntry(entry) {
	var ui = entry._ui;
	var st = entry.known ? 'fail' : (entry.state || 'idle');
	ui.row.className = 'test ' + (st === 'warn' ? 'warn' : st === 'pass' ? 'pass' : st === 'fail' ? 'fail' : 'idle') + (entry.known ? ' known' : '');
	ui.badge.textContent = st === 'warn' ? 'WARN' : st === 'pass' ? 'PASS' : st === 'fail' ? (entry.known ? 'FAIL▪' : 'FAIL') : '·';
	var d = entry.known ? (entry.detail ? entry.detail + '  —  ' + entry.known : entry.known) : entry.detail;
	ui.detail.textContent = d ? '↳ ' + (entry.state === 'warn' ? '⚑ ' : '') + d : '';
	ui.detail.style.display = d ? '' : 'none';
	ui.detail.className = entry.state === 'warn' ? 'warn-detail' : 'detail';
	if (entry._editors && entry._editors.output) {
		entry._editors.output.textarea.value = entry.output || '';
		if (entry._editors.output.painted) entry._editors.output.paint();
	}
}

function buildRow(entry) {
	var row = document.createElement('div'); row.className = 'test idle';
	var badge = document.createElement('span'); badge.className = 'badge'; badge.textContent = '·';
	var label = document.createElement('span'); label.className = 'label';
	label.textContent = entry.label;
	var runBtn = document.createElement('button'); runBtn.className = 'diff-btn'; runBtn.textContent = 'run';
	var colsBtn = document.createElement('button'); colsBtn.className = 'diff-btn'; colsBtn.textContent = 'cols';
	var panel = document.createElement('div'); panel.className = 'diff-panel';
	var detail = document.createElement('div'); detail.className = 'detail'; detail.style.display = 'none';

	var built = false;
	function buildPanel() {
		if (built) return; built = true;
		var eds = entry._editors = {
			vanilla: makeEditor('Vanilla JS (Native Engine)', 'is-native', entry.vanilla, 'js'),
			hybrid: makeEditor('Hybridized Virtual Class Inheritance (ES6-JS-DOM) [Instance.js] {Still Vanilla JS}', 'is-virtual', entry.hybrid, 'js'),
			is: makeEditor('Instance Source [.is]', 'is-source', entry.is, 'is'),
			output: makeEditor('Output', 'is-output', entry.output, 'js')
		};
		panel.appendChild(eds.vanilla.col); panel.appendChild(eds.hybrid.col);
		panel.appendChild(eds.is.col); panel.appendChild(eds.output.col);
	}
	colsBtn.addEventListener('click', function () {
		buildPanel();
		var open = panel.classList.toggle('open');
		row.classList.toggle('open', open);
		colsBtn.textContent = open ? 'close' : 'cols';
		if (open) Object.keys(entry._editors).forEach(function (k) {
			var e = entry._editors[k];
			if (!e.painted) { e.paint(); e.painted = true; }
		});
	});
	runBtn.addEventListener('click', function () { buildPanel(); runEntry(entry, panel.classList.contains('open')); });

	row.appendChild(badge); row.appendChild(label); row.appendChild(runBtn); row.appendChild(colsBtn);
	entry._ui = { row, badge, detail };
	var frag = document.createDocumentFragment();
	frag.appendChild(row); frag.appendChild(detail); frag.appendChild(panel);
	return frag;
}

function refreshSummary() {
	var p = 0, f = 0, w = 0, kf = 0;
	SUITE_REG.forEach(function (e) {
		if (!e.state) return;
		if (e.known) { kf++; return; }
		if (e.state === 'pass') p++; else if (e.state === 'warn') w++; else f++;
	});
	var el = document.getElementById('suite-summary');
	if (el) el.innerHTML = '<span class="ok">✓ ' + p + ' passed</span>&nbsp;&nbsp;'
		+ (f ? '<span class="bad">✗ ' + f + ' failed</span>' : '<span style="color:gray">✗ 0 failed</span>')
		+ (w ? '&nbsp;&nbsp;<span class="warn">⚑ ' + w + ' diverged</span>' : '')
		+ (kf ? '&nbsp;&nbsp;<span class="kf">◼ ' + kf + ' known-fail (by design)</span>' : '');
	var spans = document.querySelectorAll('.s-count');
	for (var si = 0; si < spans.length; si++) {
		(function (sp) {
			var A = sp.getAttribute('data-a'), S = sp.getAttribute('data-s');
			var es = SUITE_REG.filter(function (e) { return e.area === A && (e.suite || 'General') === S; });
			var sPass = es.filter(function (e) { return e.state === 'pass' && !e.known; }).length;
			sp.textContent = '(' + sPass + '/' + es.length + ')';
			sp.className = 's-count' + (sPass === es.length ? ' all-pass' : '');
		})(spans[si]);
	}
	SUITE_AREAS.forEach(function (a) {
		var lbl = document.getElementById('count-' + a);
		if (!lbl) return;
		var es = SUITE_REG.filter(function (e) { return e.area === a; });
		var ap = es.filter(function (e) { return e.state === 'pass' && !e.known; }).length;
		var akf = es.filter(function (e) { return e.known && e.state; }).length;
		lbl.textContent = ap + '/' + es.length + (akf ? ' · ◼' + akf : '');
	});
}

async function runArea(area) {

function buildKrausest(det) {
	// A `document` scoped to one panel: id/tag/selector queries resolve INSIDE the
	// panel, everything else (createElement, createRange, …) falls through to the
	// real document. This is what lets the verbatim vanillajs-keyed Main.js run

	var K_LBL = { run: 'Create 1,000 rows', runlots: 'Create 10,000 rows', add: 'Append 1,000 rows', update: 'Update every 10th row', clear: 'Clear', swaprows: 'Swap Rows' };
	var TT = {}; // op → { n:{last,best,c}, i:{last,best,c} }

	var host = document.createElement('div'); host.className = 'krausest';
	host.innerHTML =
		'<div class="k-note">Numbers in isolation are machine speed — the <b>\u00d7</b> column is the story: Instance best \u00f7 native best per op. ' +
		'Every op except one is raw DOM throughput, where Instance IS native JS plus the mint. ' +
		'<b>Update every 10th row</b> is the reactivity test: native loops the data and pokes each row; Instance writes ONE class-level signal (<code>KRow.$mark = ++tick</code>) and every mounted row answers by its own live rowIndex. ' +
		'Select is mild (class toggle). Remove/clear on the Instance side DISPOSE (<code>remove(true)</code>) so each row\u2019s subscription drains \u2014 honest teardown, flat memory.</div>' +
		'<table class="k-timings"><thead><tr><th>op</th><th>native last</th><th>native best</th><th>Instance last</th><th>Instance best</th><th>\u00d7</th></tr></thead><tbody id="k-timings"></tbody></table>';
	det.appendChild(host);

	function paint() {
		var tb = host.querySelector('#k-timings');
		tb.innerHTML = K_OPS.filter(function (op) { return TT[op]; }).map(function (op) {
			var t = TT[op], n = t.n, i = t.i;
			var f = function (x) { return x ? x.toFixed(1) : '\u2014'; };

			return '<tr><td class="k-op">' + op + '</td><td>' + f(n && n.last) + '</td><td>' + f(n && n.best) + '</td><td>' + f(i && i.last) + '</td><td>' + f(i && i.best) + '</td><td class="k-x">' + ratio + '</td></tr>';
		}).join('');
	}
	function record(side, op, ms) {
		var t = TT[op] || (TT[op] = {});
		var r = t[side] || (t[side] = { last: 0, best: Infinity, c: 0 });
		r.last = ms; r.best = Math.min(r.best, ms); r.c++;

		container.addEventListener('click', function (e) {
			var op = null;

			if (b && b.id) op = normalize(b.id);

			else if (e.target.closest && e.target.closest('tr')) op = 'select row';

		}, true);
	}
	function bench(title, cls, ids, srcText, boot) {
		var d = document.createElement('details'); d.className = 'k-bench ' + cls;
		var sm = document.createElement('summary'); sm.textContent = title; d.appendChild(sm);
		var body = document.createElement('div');
		body.innerHTML =
			'<div id="' + ids('main') + '">' +
			'<div class="k-controls">' + ['run', 'runlots', 'add', 'update', 'clear', 'swaprows'].map(function (op) {
				return '<button type="button" id="' + ids(op) + '">' + K_LBL[op] + '</button>';
			}).join('') + '</div>' +
			'<table class="table test-data"><tbody id="' + ids('tbody') + '"></tbody></table>' +
			'</div>' +
			'<details class="k-src"><summary>source \u2014 verbatim</summary><pre class="ed-hl k-pre"></pre></details>';
		d.appendChild(body);
		var booted = false;
		d.addEventListener('toggle', function () {

		function (op) { return op; }, window.KRAUSEST_MAIN,

		function (op) { return 'k2-' + op; }, window.KRAUSEST_INSTANCE,
		function (body) { new Function(window.KRAUSEST_INSTANCE)(); window.__K_INSTANCE_BOOT__(body); });
